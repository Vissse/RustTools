<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <link rel="icon" type="image/svg+xml" href="/logo/icco-copy.svg" /> -->
    <!-- <link rel="apple-touch-icon" href="/logo/icco-copy.svg" /> -->
    <link rel="icon" type="image/png" href="/logo/filled_icon.png" />
    <link rel="apple-touch-icon" href="/logo/filled_icon.png" />
    <meta name="theme-color" content="#0a0a0a" />
    <!-- Title and SEO meta (description, canonical, Open Graph, Twitter) are
         managed per-route by TanStack Router via <HeadContent />. The default
         fallback lives in src/routes/__root.tsx. -->
    <title>RustTools — Rust Calculators</title>
    <!-- Self-hosted fonts (see @font-face in src/styles/global.css). Preloaded so
         they're available before first paint — this prevents the fallback→webfont
         swap (FOUT) that otherwise reflowed header/footer width on load. -->
    <link
      rel="preload"
      href="/fonts/teko-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/inter-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <!-- %SEO_JSONLD% -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
